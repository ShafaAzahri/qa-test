name: Performance Testing

on:
  workflow_dispatch:

jobs:
  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - name: Install dependencies
        run: npm ci
      - name: Start Server in background
        run: npm start &
      - name: Wait for server to start
        run: sleep 3
      - name: Install k6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5DCC117B3C18D3F
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update || true
          sudo apt-get install -y k6 || (wget https://github.com/grafana/k6/releases/download/v0.45.0/k6-v0.45.0-linux-amd64.tar.gz && tar -xzf k6-v0.45.0-linux-amd64.tar.gz && sudo mv k6-v0.45.0-linux-amd64/k6 /usr/bin/k6)
      - name: Run Performance Test
        run: k6 run tests/performance/load-test.js
